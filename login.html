<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access | SSE Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Smooth transition for auth toggle */
        #nameContainer, #regExtraFields {
            transition: all 0.3s ease-in-out;
        }
        /* Custom scrollbar for the language dropdown */
        #lang-dropdown::-webkit-scrollbar {
            width: 4px;
        }
        #lang-dropdown::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col items-center justify-center p-4 md:p-6">

    <nav class="w-full max-w-4xl mb-4 flex items-center justify-between px-2">
        <a href="index.html" class="flex items-center gap-2 text-slate-600 hover:text-blue-700 transition font-bold">
            <i class="fas fa-arrow-left"></i>
            <span data-i18n="exitHome">Exit to Home</span>
        </a>

        <div class="relative inline-block text-left" id="lang-switcher">
            <button id="lang-btn" class="flex items-center space-x-2 bg-white border border-slate-200 px-3 py-2 rounded-xl hover:border-blue-600 transition shadow-sm">
                <span id="current-lang-flag">🇺🇸</span>
                <span class="text-slate-700 text-xs font-bold uppercase tracking-wider" id="current-lang-name">EN</span>
                <i class="fas fa-chevron-down text-[10px] text-slate-400"></i>
            </button>

            <div id="lang-dropdown" class="hidden absolute right-0 mt-2 w-32 bg-white border border-slate-100 rounded-xl shadow-xl z-50 overflow-hidden">
                <button class="lang-option w-full flex items-center space-x-3 px-4 py-3 hover:bg-slate-50 transition-colors" data-lang="en">
                    <span>🇺🇸</span> <span class="text-slate-700 text-xs font-bold">EN</span>
                </button>
                <button class="lang-option w-full flex items-center space-x-3 px-4 py-3 hover:bg-slate-50 transition-colors" data-lang="fr">
                    <span>🇫🇷</span> <span class="text-slate-700 text-xs font-bold">FR</span>
                </button>
                <button class="lang-option w-full flex items-center space-x-3 px-4 py-3 hover:bg-slate-50 transition-colors" data-lang="es">
                    <span>🇪🇸</span> <span class="text-slate-700 text-xs font-bold">ES</span>
                </button>
            </div>
        </div>

        <span class="text-xs font-black text-blue-600 tracking-tighter md:hidden">SSEBANK</span>
    </nav>

    <div id="toastContainer" class="fixed top-5 right-5 z-50 pointer-events-none"></div>

    <div class="bg-white w-full max-w-4xl grid md:grid-cols-2 rounded-2xl md:rounded-3xl shadow-xl overflow-hidden border border-slate-100">
        
        <div class="bg-blue-700 p-12 text-white flex flex-col justify-between hidden md:flex">
            <div>
                <h2 class="text-3xl font-bold tracking-tight">SSE BANK</h2>
                <p class="mt-4 text-blue-100 leading-relaxed text-lg" data-i18n="heroText">The world's most secure digital bank for entrepreneurs.</p>
            </div>
            <div class="space-y-4">
                <div class="flex items-center space-x-3 text-sm font-medium">
                    <span class="bg-blue-500/30 p-2 rounded-lg"><i class="fas fa-check"></i></span>
                    <span data-i18n="feat1">Instant Account Opening</span>
                </div>
                <div class="flex items-center space-x-3 text-sm font-medium">
                    <span class="bg-blue-500/30 p-2 rounded-lg"><i class="fas fa-lock"></i></span>
                    <span data-i18n="feat2">Bank-Grade Encryption</span>
                </div>
            </div>
        </div>

        <div class="p-6 md:p-12">
            <div class="mb-8">
                <h3 class="text-2xl font-bold text-slate-800" id="formTitle" data-i18n="createAcc">Create Account</h3>
                <p class="text-slate-500 text-sm mt-2" id="formSub" data-i18n="subText">Start your journey with SSE Bank today.</p>
            </div>

            <form id="authForm" class="space-y-5">
                <div id="nameContainer">
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1" data-i18n="labelName">Full Name</label>
                    <input type="text" id="fullName" placeholder="John Doe" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-600 focus:bg-white transition">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1" data-i18n="labelEmail">Email Address</label>
                    <input type="email" id="email" required placeholder="name@company.com" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-600 focus:bg-white transition">
                </div>

                <div id="regExtraFields" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1" data-i18n="labelCountry">Country</label>
                        <select id="countrySelect" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-600 focus:bg-white transition appearance-none">
                            <option value="">Loading countries...</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1" data-i18n="labelCurrency">Currency & Symbol</label>
                        <input type="text" id="currencyDisplay" readonly placeholder="Automatic" class="w-full p-3.5 bg-slate-100 border border-slate-200 rounded-xl text-slate-500 font-mono">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1" data-i18n="labelPass">Password</label>
                    <input type="password" id="password" required placeholder="••••••••" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-600 focus:bg-white transition">
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-700 text-white p-4 rounded-xl font-bold hover:bg-blue-800 active:scale-[0.98] transition shadow-lg shadow-blue-100 mt-2">
                    <span data-i18n="btnContinue">Continue</span>
                </button>
            </form>

            <div class="mt-8 text-center text-sm border-t border-slate-50 pt-6">
                <span class="text-slate-500" id="toggleText" data-i18n="alreadyAcc">Already have an account?</span>
                <button type="button" onclick="toggleAuth()" class="text-blue-700 font-bold ml-1 hover:underline" id="toggleBtn" data-i18n="loginLink">Login here</button>
            </div>
        </div>
    </div>

    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyDBFe-wSC7xuzcTjrr6sEDJo7q5dwNiq4s",
            authDomain: "loanify-208f8.firebaseapp.com",
            projectId: "loanify-208f8",
            storageBucket: "loanify-208f8.firebasestorage.app",
            messagingSenderId: "344946599669",
            appId: "1:344946599669:web:90c32f725866e1fb2d07bc"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Language Translations
        const translations = {
            en: {
                exitHome: "Exit to Home", heroText: "The world's most secure digital bank for entrepreneurs.", feat1: "Instant Account Opening", feat2: "Bank-Grade Encryption", createAcc: "Create Account", subText: "Start your journey with SSE Bank today.", labelName: "Full Name", labelEmail: "Email Address", labelCountry: "Country", labelCurrency: "Currency & Symbol", labelPass: "Password", btnContinue: "Continue", alreadyAcc: "Already have an account?", loginLink: "Login here", welcomeBack: "Welcome Back"
            },
            fr: {
                exitHome: "Retour à l'accueil", heroText: "La banque numérique la plus sécurisée au monde pour les entrepreneurs.", feat1: "Ouverture de compte instantanée", feat2: "Cryptage de niveau bancaire", createAcc: "Créer un compte", subText: "Commencez votre voyage avec SSE Bank aujourd'hui.", labelName: "Nom complet", labelEmail: "Adresse e-mail", labelCountry: "Pays", labelCurrency: "Devise et symbole", labelPass: "Mot de passe", btnContinue: "Continuer", alreadyAcc: "Vous avez déjà un compte?", loginLink: "Connectez-vous ici", welcomeBack: "Content de vous revoir"
            },
            es: {
                exitHome: "Salir al Inicio", heroText: "El banco digital más seguro del mundo para emprendedores.", feat1: "Apertura de cuenta instantánea", feat2: "Cifrado de nivel bancario", createAcc: "Crear cuenta", subText: "Comience su viaje con SSE Bank hoy.", labelName: "Nombre completo", labelEmail: "Correo electrónico", labelCountry: "País", labelCurrency: "Moneda y símbolo", labelPass: "Contraseña", btnContinue: "Continuar", alreadyAcc: "¿Ya tienes una cuenta?", loginLink: "Inicie sesión aquí", welcomeBack: "Bienvenido de nuevo"
            }
        };

        // Language Switcher Logic
        const langBtn = document.getElementById('lang-btn');
        const langDropdown = document.getElementById('lang-dropdown');
        const langOptions = document.querySelectorAll('.lang-option');

        langBtn.onclick = () => langDropdown.classList.toggle('hidden');
        window.onclick = (e) => { if(!document.getElementById('lang-switcher').contains(e.target)) langDropdown.classList.add('hidden'); };

        langOptions.forEach(opt => {
            opt.onclick = () => {
                const lang = opt.dataset.lang;
                document.getElementById('current-lang-flag').innerText = opt.querySelector('span:first-child').innerText;
                document.getElementById('current-lang-name').innerText = opt.dataset.lang.toUpperCase();
                
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if(translations[lang][key]) el.innerText = translations[lang][key];
                });
                langDropdown.classList.add('hidden');
            };
        });

        async function loadCountries() {
            const select = document.getElementById('countrySelect');
            const currencyInput = document.getElementById('currencyDisplay');
            try {
                const response = await fetch('https://restcountries.com/v3.1/all?fields=name,currencies');
                const data = await response.json();
                select.innerHTML = '<option value="">Select Country</option>';
                const sorted = data.sort((a, b) => a.name.common.localeCompare(b.name.common));
                sorted.forEach(country => {
                    const code = Object.keys(country.currencies || {})[0];
                    const symbol = code ? country.currencies[code].symbol : '';
                    if (!code) return;
                    const opt = document.createElement('option');
                    opt.value = country.name.common;
                    opt.textContent = country.name.common;
                    opt.dataset.code = code;
                    opt.dataset.symbol = symbol;
                    opt.dataset.currency = `${code} (${symbol})`;
                    select.appendChild(opt);
                });
                select.onchange = () => {
                    const selected = select.options[select.selectedIndex];
                    currencyInput.value = selected.dataset.currency || "";
                };
            } catch (err) { select.innerHTML = '<option value="">Error</option>'; }
        }
        loadCountries();

        let isLogin = false;
        window.toggleAuth = function() {
            isLogin = !isLogin;
            const lang = document.getElementById('current-lang-name').innerText.toLowerCase();
            document.getElementById('formTitle').innerText = isLogin ? translations[lang].welcomeBack : translations[lang].createAcc;
            document.getElementById('nameContainer').classList.toggle('hidden', isLogin);
            document.getElementById('regExtraFields').classList.toggle('hidden', isLogin);
            document.getElementById('toggleBtn').innerText = isLogin ? translations[lang].createAcc + " here" : translations[lang].loginLink;
            document.getElementById('submitBtn').querySelector('span').innerText = isLogin ? "Login" : translations[lang].btnContinue;
        };

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullName').value;
            const countrySelect = document.getElementById('countrySelect');
            const selectedOpt = countrySelect.options[countrySelect.selectedIndex];

            try {
                if (isLogin) {
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        const userData = userDoc.data();
                        localStorage.setItem('userCurrencySymbol', userData.currencySymbol || "$");
                        localStorage.setItem('userCurrencyCode', userData.currencyCode || "USD");
                    }
                } else {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    const code = selectedOpt.dataset.code || "USD";
                    const symbol = selectedOpt.dataset.symbol || "$";
                    localStorage.setItem('userCurrencySymbol', symbol);
                    localStorage.setItem('userCurrencyCode', code);
                    await setDoc(doc(db, "users", user.uid), {
                        name: fullName,
                        email: email,
                        balance: 0,
                        currencyCode: code,
                        currencySymbol: symbol,
                        country: selectedOpt.value,
                        accountNumber: Math.floor(1000000000 + Math.random() * 9000000000),
                        createdAt: serverTimestamp(),
                        isVerified: false
                    });
                }
                window.location.href = "dashboard.html";
            } catch (error) { alert(error.message); }
        });
    </script>
</body>
</html>
